services:
  redis:
    image: redis:8-alpine
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redisdata:/data
      - ./deploy/redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf

  redis-commander:
    image: rediscommander/redis-commander
    restart: always
    ports:
      - 8081:8081
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis

volumes:
  redisdata:
