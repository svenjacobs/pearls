# Quadlet pod deployment — all containers share a network namespace,
# so the app is reachable on localhost:3000 from within the pod.

server {
    listen 80;
    server_name _;

    # SSE endpoint: disable buffering and extend the read timeout so
    # long-lived event streams are not interrupted by nginx.
    location /api/game/events {
        proxy_pass          http://localhost:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  86400s;
    }

    location /api/status/events {
        proxy_pass          http://localhost:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host               $host;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  86400s;
    }

    # Block admin API from public access.
    location /api/admin {
        return 403;
    }

    location / {
        proxy_pass          http://localhost:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade            $http_upgrade;
        proxy_set_header    Connection         'upgrade';
        proxy_set_header    Host               $host;
        proxy_set_header    X-Real-IP          $remote_addr;
        proxy_set_header    X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto  $scheme;
        proxy_set_header    Origin             $http_origin;
    }
}
