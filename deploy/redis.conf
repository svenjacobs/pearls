# Append-only log for durability (survives crashes without snapshot gaps).
appendonly yes

# Save a snapshot if at least 1 key changed in the last 30 seconds.
# Adjust the interval to match how much data loss is acceptable.
save 30 1

# Where to write the snapshot file (inside the container).
dir /data
dbfilename dump.rdb

# Compress the snapshot with LZF to save disk space.
rdbcompression yes

# Verify the snapshot with a CRC64 checksum on load.
rdbchecksum yes
