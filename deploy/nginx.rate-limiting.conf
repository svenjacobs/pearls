# Quadlet pod deployment — all containers share a network namespace,
# so the app is reachable on localhost:3000 from within the pod.
#
# Drop-in replacement for nginx.conf that adds rate limiting, connection
# caps, request body limits, and security headers.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Zone definitions must live in the http block.
    limit_conn_zone $binary_remote_addr zone=perip:10m;
    limit_req_zone  $binary_remote_addr zone=sse:10m  rate=5r/m;
    limit_req_zone  $binary_remote_addr zone=api:10m  rate=60r/m;

    server {
        listen 80;
        server_name _;

        # Cap total concurrent connections per IP to prevent fd exhaustion.
        limit_conn perip 50;

        # Reject large bodies before they reach Node.js; game actions are tiny JSON.
        client_max_body_size 16k;

        # Security headers.
        add_header X-Frame-Options        DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy        strict-origin-when-cross-origin;

        # SSE endpoint: keep the long read timeout so streams are not interrupted,
        # but cap concurrent SSE connections per IP and throttle reconnect attempts.
        # 5 concurrent streams is generous for a single player with multiple tabs.
        location /api/game/events {
            limit_conn perip 5;
            limit_req  zone=sse burst=3 nodelay;

            proxy_pass         http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 86400s;
            add_header         X-Accel-Buffering no;
        }

        # Block admin API from public access.
        location /api/admin {
            return 403;
        }

        # API mutations: short proxy timeout kills slowloris; rate limit stops floods.
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # Pages and static assets.
        location / {
            proxy_pass         http://localhost:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Origin            $http_origin;
            proxy_read_timeout 30s;
        }
    }
}
