services:
  redis:
    image: redis:8-alpine
    command: redis-server /etc/redis/redis.conf
    volumes:
      - redis-data:/data
      - ./deploy/redis.conf:/etc/redis/redis.conf:ro
    networks:
      - internal
    restart: unless-stopped

  app:
    build: .
    env_file: .env
    environment:
      # Override REDIS_URL from .env: use the service name, not localhost
      REDIS_URL: redis://redis:6379
    volumes:
      - /var/log/pearls:/var/log/pearls
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - '8080:80'
    volumes:
      - ./deploy/nginx.compose.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      - app

  cleanup:
    image: alpine
    env_file: .env
    environment:
      CLEANUP_URL: http://app:3000
    volumes:
      - ./deploy/pearls-cleanup.cron:/etc/crontabs/root:ro
    networks:
      - internal
    restart: unless-stopped
    depends_on:
      - app
    command: >
      sh -c "printf 'CLEANUP_SECRET=%s\nCLEANUP_URL=%s\n' \"$$CLEANUP_SECRET\" \"$$CLEANUP_URL\" > /etc/environment && crond -f -l 2"

volumes:
  redis-data:

networks:
  internal:
