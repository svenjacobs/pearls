<!doctype html>
<html lang="%lang%" dir="%dir%">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--
      Inline theme initializer — must run before any content renders to avoid a flash
      of the wrong theme (FOUC). Reads `pearls:theme` ("light" | "dark") from
      localStorage and falls back to the OS preference when absent (system mode).
      Sets or clears the `dark` class on <html>, which activates Tailwind's
      `@custom-variant dark` selector defined in app.css.
    -->
    <script>
      try {
        const t = localStorage.getItem('pearls:theme')
        document.documentElement.classList.toggle(
          'dark',
          t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches),
        )
      } catch (_) {}
    </script>
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f9fafb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111827" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Pearls" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon-180x180.png" />
    <!--
      Service-worker registration. Intentionally inline rather than delegated to
      the SvelteKitPWA plugin's injectRegister option: that option uses Vite's
      transformIndexHtml hook, which only runs during the build/dev pass and is
      never applied to pages rendered at request time by the adapter-node server.
      Absolute paths are required because relative ones (the plugin's default)
      resolve against the document URL, breaking registration on any sub-path
      route (e.g. /[inviteCode]/boards would look for /[inviteCode]/service-worker.js).
    -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
        })
      }
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
