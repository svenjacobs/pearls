name: PR

on:
  pull_request:
    branches: [main]

jobs:
  lint-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    uses: ./.github/workflows/check.yml
