name: Check

on:
  workflow_call:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: cp .env.example .env

      - run: pnpm build

      - run: pnpm check

      - run: pnpm test

      - run: pnpm test:integration
